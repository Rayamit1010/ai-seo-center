map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream seo_command_center_upstream {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name seoagent.techgeekstudio.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name seoagent.techgeekstudio.com;

  ssl_certificate /etc/letsencrypt/live/seoagent.techgeekstudio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/seoagent.techgeekstudio.com/privkey.pem;

  client_max_body_size 25m;

  location / {
    proxy_pass http://seo_command_center_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  location /_next/static/ {
    proxy_pass http://seo_command_center_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }
}
